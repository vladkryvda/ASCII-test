<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D ASCII Earth</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', monospace; user-select: none; }
        #starfield { position: fixed; top: 0; left: 0; z-index: -1; }
        #container { display: flex; justify-content: center; align-items: center; height: 100vh; cursor: grab; }
        #container:active { cursor: grabbing; }
        #ascii-render { font-size: 9px; line-height: 8px; white-space: pre; text-shadow: 0 0 5px rgba(0, 150, 255, 0.3); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 15px 30px; border: 1px solid #00f; color: #00f; background: none; cursor: pointer; letter-spacing: 2px; transition: 0.3s; font-family: inherit; }
        .btn:hover { background: #00f; color: #fff; box-shadow: 0 0 20px #00f; }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- Кнопка запуску -->
<div id="overlay" onclick="init()">
    <h1 style="font-weight: 100; letter-spacing: 10px; color: #00f;">EARTH SYSTEM</h1>
    <button class="btn">INITIALIZE</button>
</div>

<div id="container">
    <pre id="ascii-render"></pre>
</div>

<!-- Невидимий плеєр YouTube для музики -->
<div id="player" style="display:none"></div>

<script>
let player;
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '0', width: '0',
        videoId: 'VJM7yWMG4eE',
        playerVars: { 'autoplay': 0, 'controls': 0, 'start': 0 },
        events: { 'onReady': (e) => console.log("Audio Ready") }
    });
}

function init() {
    document.getElementById('overlay').style.display = 'none';
    if (player && player.playVideo) player.playVideo();
    render();
}

// Завантаження YouTube API
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

const pre = document.getElementById('ascii-render');
const width = 120, height = 60;
const chars = " .:-=+*#%@";

let rotX = 0, rotY = 0;
let isDragging = false, lastX, lastY;

document.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
document.addEventListener('mousemove', e => {
    if (isDragging) {
        rotY += (e.clientX - lastX) * 0.01;
        rotX += (e.clientY - lastY) * 0.01;
        lastX = e.clientX; lastY = e.clientY;
    }
});
document.addEventListener('mouseup', () => isDragging = false);

/** 3D МАТЕМАТИКА ЗЕМЛІ **/
function render() {
    let output = "";
    let cx = Math.cos(rotY), sx = Math.sin(rotY);
    let cy = Math.cos(rotX), sy = Math.sin(rotX);

    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            let nx = (x - width / 2) / (width / 4);
            let ny = (y - height / 2) / (height / 4) * 1.8;
            
            // Сфера: x^2 + y^2 + z^2 = r^2
            let r2 = nx*nx + ny*ny;
            if (r2 < 1.0) {
                let nz = Math.sqrt(1.0 - r2); // Z-координата для об'єму

                // Обертання
                let rx = nx * cx + nz * sx;
                let rz = -nx * sx + nz * cx;
                let ry = ny * cy + rz * sy;
                rz = -ny * sy + rz * cy;

                // Генерація "материків" через шум (проста математика)
                let lat = Math.acos(ry);
                let lon = Math.atan2(rx, rz);
                let land = Math.sin(lon * 5) * Math.cos(lat * 3) + Math.sin(lat * 10 + lon * 2);
                
                // Освітлення (Глибина)
                let diff = Math.max(0.1, rz); 
                let charIdx = Math.floor(diff * 9);
                let char = chars[charIdx];

                let color = "#0044ff"; // Океан
                if (land > 0.3) color = "#00ff44"; // Суша
                if (Math.abs(ry) > 0.85 && land > 0) color = "#ffffff"; // Полюси

                output += `<span style="color:${color}">${char}</span>`;
            } else {
                output += " ";
            }
        }
        output += "\n";
    }

    pre.innerHTML = output;
    if (!isDragging) rotY += 0.005; // Авто-обертання
    requestAnimationFrame(render);
}

/** STARFIELD **/
const sc = document.getElementById('starfield');
const sctx = sc.getContext('2d');
let stars = Array(200).fill().map(() => ({ x: Math.random(), y: Math.random(), s: Math.random() }));
function drawStars() {
    sc.width = window.innerWidth; sc.height = window.innerHeight;
    sctx.fillStyle = "#fff";
    stars.forEach(s => sctx.fillRect(s.x * sc.width, s.y * sc.height, s.s * 2, s.s * 2));
}
window.addEventListener('resize', drawStars);
drawStars();
</script>
</body>
</html>

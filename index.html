<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII 3D Cube & Stars - Isle Unto Thyself</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            color: #fff; font-family: 'Courier New', monospace;
            user-select: none; -webkit-user-select: none;
        }

        #starfield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        #canvas-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; cursor: grab; text-align: center;
        }

        pre {
            font-size: 10px; line-height: 8px; font-weight: bold;
            background: transparent; pointer-events: none;
        }

        /* Підказка, яка зникне після кліку */
        #hint {
            position: fixed; bottom: 30px; width: 100%;
            text-align: center; color: #333; font-size: 12px;
            letter-spacing: 2px; transition: 1s; z-index: 5;
        }
    </style>
</head>
<body onclick="startAudio()">

    <canvas id="starfield"></canvas>

    <div id="canvas-container">
        <pre id="ascii-cube"></pre>
    </div>

    <div id="hint">CLICK ANYWHERE FOR AUDIO</div>

    <div id="player" style="display:none"></div>

    <script>
        let player;
        let audioStarted = false;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'L2YvX3qcqZ4',
                playerVars: { 'autoplay': 0, 'controls': 0, 'start': 0 }
            });
        }

        function startAudio() {
            if (audioStarted) return;
            audioStarted = true;
            
            // Ховаємо підказку
            document.getElementById('hint').style.opacity = '0';

            // Затримка 1 секунда перед музикою
            setTimeout(() => {
                if (player && player.playVideo) player.playVideo();
            }, 1000);
        }

        /** ЗІРКИ **/
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.alpha = 0;
                this.fadeSpeed = Math.random() * 0.015 + 0.005;
                this.fadingIn = true;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                if (this.fadingIn) {
                    this.alpha += this.fadeSpeed;
                    if (this.alpha >= 0.8) this.fadingIn = false;
                } else {
                    this.alpha -= this.fadeSpeed;
                    if (this.alpha <= 0) this.init();
                }
            }
        }

        for (let i = 0; i < 150; i++) stars.push(new Star());

        /** 3D CUBE **/
        const pre = document.getElementById('ascii-cube');
        let A = 0, B = 0, C = 0;
        let isDragging = false;
        let lastMouseX, lastMouseY;
        const width = 80, height = 40;
        const zBuffer = new Float32Array(width * height);
        const buffer = new Uint8Array(width * height);

        function calculateX(i, j, k) { return j * Math.sin(A) * Math.sin(B) * Math.cos(C) - k * Math.cos(A) * Math.sin(B) * Math.cos(C) + j * Math.cos(A) * Math.sin(C) + k * Math.sin(A) * Math.sin(C) + i * Math.cos(B) * Math.cos(C); }
        function calculateY(i, j, k) { return j * Math.cos(A) * Math.cos(C) + k * Math.sin(A) * Math.cos(C) - j * Math.sin(A) * Math.sin(B) * Math.sin(C) + k * Math.cos(A) * Math.sin(B) * Math.sin(C) - i * Math.cos(B) * Math.sin(C); }
        function calculateZ(i, j, k) { return k * Math.cos(A) * Math.cos(B) - j * Math.sin(A) * Math.cos(B) + i * Math.sin(B); }

        function calculateForSurface(cubeX, cubeY, cubeZ, char) {
            let x = calculateX(cubeX, cubeY, cubeZ);
            let y = calculateY(cubeX, cubeY, cubeZ);
            let z = calculateZ(cubeX, cubeY, cubeZ) + 100;
            let ooz = 1 / z;
            let xp = Math.floor(width / 2 + 40 * ooz * x * 2.2); 
            let yp = Math.floor(height / 2 + 40 * ooz * y);
            let idx = xp + yp * width;
            if (idx >= 0 && idx < width * height) {
                if (ooz > zBuffer[idx]) { zBuffer[idx] = ooz; buffer[idx] = char.charCodeAt(0); }
            }
        }

        function renderAll() {
            // Оновлення зірок
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => { star.update(); star.draw(); });

            // Оновлення куба
            buffer.fill(32); zBuffer.fill(0);
            for (let v = -20; v < 20; v += 0.6) {
                for (let h = -20; h < 20; h += 0.6) {
                    calculateForSurface(v, h, 20, '@'); calculateForSurface(v, h, -20, '#');
                    calculateForSurface(20, v, h, '$'); calculateForSurface(-20, v, h, '~');
                    calculateForSurface(v, 20, h, '!'); calculateForSurface(v, -20, h, ';');
                }
            }
            let output = "";
            for (let i = 0; i < width * height; i++) {
                output += String.fromCharCode(buffer[i]);
                if (i % width === width - 1) output += "\n";
            }
            pre.innerHTML = output;

            if (!isDragging) { A += 0.015; B += 0.015; }
            requestAnimationFrame(renderAll);
        }

        // Керування мишкою (працює завжди)
        document.addEventListener('mousedown', e => { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; });
        document.addEventListener('mousemove', e => {
            if (isDragging) {
                let dx = e.clientX - lastMouseX; let dy = e.clientY - lastMouseY;
                B += dx * 0.01; A -= dy * 0.01; lastMouseX = e.clientX; lastMouseY = e.clientY;
            }
        });
        document.addEventListener('mouseup', () => isDragging = false);

        // Запуск загального циклу рендерингу
        renderAll();
    </script>
</body>
</html>

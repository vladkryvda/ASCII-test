<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII 3D Cube & Stars - The Mind Electric</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            /* Захист від виділення тексту */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #canvas-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            cursor: grab;
            text-align: center;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        pre {
            font-size: 10px;
            line-height: 8px;
            font-weight: bold;
            background: transparent;
            pointer-events: none; /* Текст не заважає клікам */
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            color: #fff;
            background: none;
            letter-spacing: 5px;
            transition: 0.5s;
            font-family: inherit;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="overlay" onclick="init()">
        <div class="btn">INITIALIZE CUBE</div>
    </div>

    <div id="canvas-container">
        <pre id="ascii-cube"></pre>
    </div>

    <div id="player" style="display:none"></div>

    <script>
        /** МУЗИКА (YouTube API) **/
        let player;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'ojvldIzbaMo',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'start': 25 // Старт з 25 секунди
                },
                events: {
                    'onReady': () => console.log("Audio Engine Ready")
                }
            });
        }

        function init() {
            document.getElementById('overlay').style.display = 'none';
            if (player && player.playVideo) player.playVideo();
            renderCube();
        }

        /** ЕФЕКТ ЗІРОК **/
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.alpha = 0;
                this.fadeSpeed = Math.random() * 0.02 + 0.005;
                this.fadingIn = true;
                this.maxAlpha = Math.random() * 0.8 + 0.2;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                if (this.fadingIn) {
                    this.alpha += this.fadeSpeed;
                    if (this.alpha >= this.maxAlpha) this.fadingIn = false;
                } else {
                    this.alpha -= this.fadeSpeed;
                    if (this.alpha <= 0) this.init();
                }
            }
        }

        for (let i = 0; i < 150; i++) stars.push(new Star());

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => { star.update(); star.draw(); });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        /** 3D ASCII CUBE **/
        const pre = document.getElementById('ascii-cube');
        let A = 0, B = 0, C = 0;
        let isDragging = false;
        let lastMouseX, lastMouseY;

        const width = 80, height = 40;
        const zBuffer = new Float32Array(width * height);
        const buffer = new Uint8Array(width * height);

        function calculateX(i, j, k) {
            return j * Math.sin(A) * Math.sin(B) * Math.cos(C) - k * Math.cos(A) * Math.sin(B) * Math.cos(C) +
                j * Math.cos(A) * Math.sin(C) + k * Math.sin(A) * Math.sin(C) + i * Math.cos(B) * Math.cos(C);
        }

        function calculateY(i, j, k) {
            return j * Math.cos(A) * Math.cos(C) + k * Math.sin(A) * Math.cos(C) -
                j * Math.sin(A) * Math.sin(B) * Math.sin(C) + k * Math.cos(A) * Math.sin(B) * Math.sin(C) -
                i * Math.cos(B) * Math.sin(C);
        }

        function calculateZ(i, j, k) {
            return k * Math.cos(A) * Math.cos(B) - j * Math.sin(A) * Math.cos(B) + i * Math.sin(B);
        }

        function calculateForSurface(cubeX, cubeY, cubeZ, char) {
            let x = calculateX(cubeX, cubeY, cubeZ);
            let y = calculateY(cubeX, cubeY, cubeZ);
            let z = calculateZ(cubeX, cubeY, cubeZ) + 100;

            let ooz = 1 / z;
            // Корекція пропорцій (2.2) для компенсації висоти рядка в консолі/pre
            let xp = Math.floor(width / 2 + 40 * ooz * x * 2.2); 
            let yp = Math.floor(height / 2 + 40 * ooz * y);

            let idx = xp + yp * width;
            if (idx >= 0 && idx < width * height) {
                if (ooz > zBuffer[idx]) {
                    zBuffer[idx] = ooz;
                    buffer[idx] = char.charCodeAt(0);
                }
            }
        }

        function renderCube() {
            buffer.fill(32);
            zBuffer.fill(0);

            for (let v = -20; v < 20; v += 0.6) {
                for (let h = -20; h < 20; h += 0.6) {
                    calculateForSurface(v, h, 20, '@');
                    calculateForSurface(v, h, -20, '#');
                    calculateForSurface(20, v, h, '$');
                    calculateForSurface(-20, v, h, '~');
                    calculateForSurface(v, 20, h, '!');
                    calculateForSurface(v, -20, h, ';');
                }
            }

            let output = "";
            for (let i = 0; i < width * height; i++) {
                output += String.fromCharCode(buffer[i]);
                if (i % width === width - 1) output += "\n";
            }
            pre.innerHTML = output;

            if (!isDragging) {
                A += 0.015;
                B += 0.015;
            }

            requestAnimationFrame(renderCube);
        }

        document.addEventListener('mousedown', e => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        document.addEventListener('mousemove', e => {
            if (isDragging) {
                let dx = e.clientX - lastMouseX;
                let dy = e.clientY - lastMouseY;
                B += dx * 0.01;
                A -= dy * 0.01;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        document.addEventListener('mouseup', () => isDragging = false);
    </script>
</body>
</html>
